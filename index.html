<!DOCTYPE html>
<html>
<head>
    <title>Vegetation Health Prediction Tool (The ICON)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">
        <h2 class="text-center mb-4">Vegetation Health Prediction Tool</h2>

        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>NDVI Mean</label>
                    <input type="number" step="0.01" name="ndvi_mean" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>NDVI Max</label>
                    <input type="number" step="0.01" name="ndvi_max" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>NDVI Min</label>
                    <input type="number" step="0.01" name="ndvi_min" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>NDVI Std Dev</label>
                    <input type="number" step="0.01" name="ndvi_std" class="form-control" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100">Predict</button>
        </form>

        {% if prediction %}
        <div class="mt-4 text-center">
            <h4>Prediction Result:</h4>

            {% if prediction == "Healthy" %}
                <div class="alert alert-success">
                    Healthy Vegetation 🌿
                </div>
            {% elif prediction == "Moderate" %}
                <div class="alert alert-warning">
                    Moderate Vegetation 🌾
                </div>
            {% else %}
                <div class="alert alert-danger">
                    Stressed Vegetation 🌵
                </div>
            {% endif %}

            <p><strong>Confidence:</strong> {{ confidence }}</p>
        </div>
        {% endif %}

        <div class="text-center mt-3">
            <a href="/history" class="btn btn-secondary">View History</a>
        </div>

    </div>
</div>

</body>
</html>
